<!DOCTYPE html>
<!-- Dichiara che il documento è HTML5 -->

<html>
<head>
  <meta charset="utf-8">
  
<link rel="stylesheet" href="style_reg.css">
  <meta name="generator" content="AlterVista - Editor HTML"/>


  <title>Registrati</title>
</head>

<body>

  <h1>Iscriviti!</h1>

  <div class="login-box">
  <!-- Box che contiene il form, utile per applicare stili CSS (sfondo, padding, bordi, ecc.) -->


    <form action="register_action.php" method="GET">
    <!-- Inizio del form
         action="register_action.php" → indica il file PHP che processa i dati
         method="GET" → i dati verranno inviati tramite URL  -->

      <label for="nome">Nome</label>
      <!-- Etichetta per il campo "nome" -->

      <input type="text" name="nome" required>
      <!-- Campo di input di tipo testo per il nome, required = obbligatorio -->

      <label for="cognome">Cognome</label>
      <input type="text" name="cognome" required>
      <!-- Campo per il cognome, obbligatorio -->

      <label for="username">Username</label>
      <input type="text" name="username" required>
      <!-- Campo per lo username, obbligatorio -->

      <label for="password">Password</label>
      <input type="password" name="password" required>
      <!-- Campo password (i caratteri saranno nascosti), obbligatorio -->

      <label for="email">Email</label>
      <input type="email" name="email" required>
      <!-- Campo email, il browser verifica che sia in formato corretto, obbligatorio -->

      <button type="submit">Accedi</button>
      <!-- Pulsante per inviare il form al file PHP indicato in action -->
    </form>
  </div>
</body>
</html>
